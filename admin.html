<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>おあしすヒーローズ 管理</title><style>:root{--bg:#f6f8ee;--ink:#18251e;--muted:#637065;--line:#dce4d5;--panel:#fff;--accent:#2d8c57;--danger:#b64a3b}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{padding:18px;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:2}h1{font-size:24px;margin:0 0 6px}h2{font-size:18px;margin:0 0 12px}main{width:min(1180px,100%);margin:0 auto;padding:16px;display:grid;gap:14px}section{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px}.sub,.meta,.log{color:var(--muted);font-size:13px}.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;align-items:end}label{display:grid;gap:5px;font-size:13px;color:var(--muted)}input,select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px;color:var(--ink);background:#fff;font:inherit}button{border:0;background:var(--accent);color:#fff;border-radius:8px;padding:10px 12px;font-weight:700;cursor:pointer}button.secondary{background:#edf3e9;color:var(--ink);border:1px solid var(--line)}.actions{display:flex;gap:8px;flex-wrap:wrap}.grid{display:grid;gap:8px}.list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.card{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff;display:grid;gap:5px}.pill{display:inline-flex;width:fit-content;border-radius:999px;background:#edf3e9;color:var(--ink);padding:3px 8px;font-size:12px;margin-right:4px}.preview{width:72px;height:72px;border:1px solid var(--line);border-radius:8px;background:#f7faf4;object-fit:contain;padding:6px}.hidden{display:none}.error{color:var(--danger)}@media(max-width:800px){.row,.list{grid-template-columns:1fr}}</style></head><body><header><h1>おあしすヒーローズ 管理</h1><div class="sub">装備マスターとMODマスターを登録します。</div></header><main><section id="gate"><h2>管理メニュー</h2><div class="row"><label>API URL<input id="apiBase" value="https://api.oasis.red"></label><label>管理トークン<input id="adminToken" type="password" placeholder="HEROES_ADMIN_TOKEN"></label><div class="actions"><button type="button" onclick="enterAdmin()">管理メニューへ</button></div></div><div class="log" id="gateLog">管理画面へ進むには HEROES_ADMIN_TOKEN が必要です。</div></section><div id="adminApp" class="hidden grid"><section><h2>接続設定</h2><div class="actions"><button type="button" onclick="saveSettings()">設定保存</button><button class="secondary" type="button" onclick="loadData()">再読み込み</button><button class="secondary" type="button" onclick="leaveAdmin()">ログアウト</button></div><div class="log" id="log"></div></section><section><h2>装備登録</h2><form class="grid" id="templateForm"><div class="row"><label>キー<input name="key" placeholder="flame_sword" required></label><label>装備名<input name="name" placeholder="炎の剣" required></label><label>カテゴリ<select name="category"><option value="weapon">武器</option><option value="offhand">オフハンド</option><option value="armor">防具</option><option value="accessory">アクセサリー</option></select></label><label>スロット<select name="slot"><option value="main_hand">メイン武器</option><option value="off_hand">オフハンド</option><option value="head">兜</option><option value="body">鎧</option><option value="hands">手袋</option><option value="feet">靴</option><option value="ring">リング</option><option value="amulet">アミュレット</option><option value="belt">ベルト</option></select></label></div><div class="row"><label>装備種<input name="equipment_type" placeholder="剣 / 盾 / 兜"></label><label>片手/両手<select name="hand_type"><option value="">なし</option><option value="one_hand">片手</option><option value="two_hand">両手</option></select></label><label>許可オフハンド<input name="allowed_offhand_type" placeholder="矢筒"></label><label>画像<select name="image_url" id="imageSelect" onchange="updatePreview()"></select></label></div><div class="row"><div><img id="imagePreview" class="preview" alt="装備画像プレビュー"></div><label>物理ダメージ<input name="base_physical_damage" type="number" value="0"></label><label>魔法ダメージ<input name="base_magic_damage" type="number" value="0"></label><label>クリ率<input name="base_crit_rate" type="number" step="0.1" value="0"></label></div><div class="row"><label>クリダメ<input name="base_crit_damage" type="number" step="0.1" value="0"></label><label>物理防御<input name="base_physical_defense" type="number" value="0"></label><label>魔法防御<input name="base_magic_defense" type="number" value="0"></label><label>回避<input name="base_evasion" type="number" value="0"></label></div><div class="row"><label>シールド<input name="base_shield" type="number" value="0"></label><label>必要Lv<input name="min_level" type="number" value="1"></label><label>ドロップ重み<input name="drop_weight" type="number" value="100"></label><label>有効<select name="enabled"><option value="true">有効</option><option value="false">無効</option></select></label></div><div class="actions"><button type="submit">装備を登録</button><button class="secondary" type="reset">クリア</button></div></form></section><section><h2>MOD登録</h2><form class="grid" id="modForm"><div class="row"><label>キー<input name="key" placeholder="fire_damage_flat" required></label><label>MOD名<input name="name" placeholder="火ダメージ追加" required></label><label>対象<select name="target_category"><option value="weapon">武器</option><option value="defense">防具/アクセ</option></select></label><label>ステータスキー<input name="stat_key" placeholder="fire_damage"></label></div><div class="row"><label>値タイプ<select name="value_type"><option value="percent">%</option><option value="flat">固定値</option></select></label><label>最小値<input name="min_value" type="number" step="0.1" value="1"></label><label>最大値<input name="max_value" type="number" step="0.1" value="10"></label><label>単位<input name="unit" placeholder="%"></label></div><div class="row"><label>抽選重み<input name="weight" type="number" value="100"></label><label>有効<select name="enabled"><option value="true">有効</option><option value="false">無効</option></select></label><div class="actions"><button type="submit">MODを登録</button><button class="secondary" type="reset">クリア</button></div></div></form></section><section><h2>登録済み装備</h2><div class="list" id="templates"></div></section><section><h2>登録済みMOD</h2><div class="list" id="mods"></div></section></div></main><script>const EQUIPMENT_IMAGES=[["剣","assets/equipment/weapon/sword.svg"],["大剣","assets/equipment/weapon/greatsword.svg"],["槍","assets/equipment/weapon/spear.svg"],["弓","assets/equipment/weapon/bow.svg"],["ロッド","assets/equipment/weapon/rod.svg"],["スタッフ","assets/equipment/weapon/staff.svg"],["短剣","assets/equipment/weapon/dagger.svg"],["銃","assets/equipment/weapon/gun.svg"],["盾","assets/equipment/offhand/shield.svg"],["セプター","assets/equipment/offhand/scepter.svg"],["フォーカス","assets/equipment/offhand/focus.svg"],["矢筒","assets/equipment/offhand/quiver.svg"],["兜","assets/equipment/armor/helm.svg"],["鎧","assets/equipment/armor/armor.svg"],["手袋","assets/equipment/armor/gloves.svg"],["靴","assets/equipment/armor/boots.svg"],["リング","assets/equipment/accessory/ring.svg"],["アミュレット","assets/equipment/accessory/amulet.svg"],["ベルト","assets/equipment/accessory/belt.svg"]];const params=new URLSearchParams(location.search),apiInput=document.getElementById("apiBase"),tokenInput=document.getElementById("adminToken"),log=document.getElementById("log"),gateLog=document.getElementById("gateLog");apiInput.value=params.get("api")||localStorage.getItem("heroes_admin_api")||"https://api.oasis.red";tokenInput.value=localStorage.getItem("heroes_admin_token")||"";document.getElementById("imageSelect").innerHTML=EQUIPMENT_IMAGES.map(([label,path])=>`<option value="${path}">${label}</option>`).join("");updatePreview();function apiBase(){return apiInput.value.replace(/\/$/,"")}function adminToken(){return tokenInput.value.trim()}function setGate(open){document.getElementById("gate").classList.toggle("hidden",open);document.getElementById("adminApp").classList.toggle("hidden",!open)}function updatePreview(){document.getElementById("imagePreview").src=document.getElementById("imageSelect").value}function saveSettings(){localStorage.setItem("heroes_admin_api",apiBase());localStorage.setItem("heroes_admin_token",adminToken());message("保存しました。")}async function enterAdmin(){if(!adminToken()){gateLog.textContent="管理トークンを入力してください。";gateLog.className="log error";return}saveSettings();setGate(true);await loadData()}function leaveAdmin(){localStorage.removeItem("heroes_admin_token");tokenInput.value="";setGate(false)}function message(text,isError=false){log.textContent=text;log.className=isError?"log error":"log"}async function api(path,options={}){const res=await fetch(`${apiBase()}${path}`,{headers:{"Content-Type":"application/json","X-Heroes-Admin-Token":adminToken()},...options});const data=await res.json();if(!res.ok)throw new Error(data.detail||"通信に失敗しました");return data}function formData(form){const data=Object.fromEntries(new FormData(form).entries());for(const key of["base_physical_damage","base_magic_damage","base_crit_rate","base_crit_damage","base_physical_defense","base_magic_defense","base_evasion","base_shield","min_level","drop_weight","min_value","max_value","weight"]){if(key in data)data[key]=Number(data[key]||0)}if("enabled"in data)data.enabled=data.enabled==="true";for(const key of Object.keys(data)){if(data[key]==="")data[key]=null}data.admin_token=adminToken();return data}document.getElementById("templateForm").addEventListener("submit",async event=>{event.preventDefault();try{await api("/api/heroes/admin/equipment/templates",{method:"POST",body:JSON.stringify(formData(event.currentTarget))});message("装備を登録しました。");event.currentTarget.reset();updatePreview();loadData()}catch(error){message(error.message,true)}});document.getElementById("modForm").addEventListener("submit",async event=>{event.preventDefault();try{await api("/api/heroes/admin/equipment/mods",{method:"POST",body:JSON.stringify(formData(event.currentTarget))});message("MODを登録しました。");event.currentTarget.reset();loadData()}catch(error){message(error.message,true)}});async function loadData(){try{const[templates,mods]=await Promise.all([api("/api/heroes/admin/equipment/templates"),api("/api/heroes/admin/equipment/mods")]);renderTemplates(templates.templates||[]);renderMods(mods.mods||[]);message("読み込みました。")}catch(error){message(error.message,true)}}function renderTemplates(items){document.getElementById("templates").innerHTML=items.length?items.map(item=>`<div class="card"><strong>${item.name}</strong><div><span class="pill">${item.category}</span><span class="pill">${item.slot}</span><span class="pill">${item.equipment_type||"-"}</span></div>${item.image_url?`<img class="preview" src="${item.image_url}" alt="">`:""}<div class="meta">物理${item.base_physical_damage} / 魔法${item.base_magic_damage} / 防御${item.base_physical_defense} / 魔防${item.base_magic_defense} / 回避${item.base_evasion} / シールド${item.base_shield}</div><div class="meta">Lv${item.min_level} / 重み ${item.drop_weight} / ${item.enabled?"有効":"無効"}</div></div>`).join(""):`<div class="meta">まだありません。</div>`}function renderMods(items){document.getElementById("mods").innerHTML=items.length?items.map(item=>`<div class="card"><strong>${item.name}</strong><div><span class="pill">${item.target_category}</span><span class="pill">${item.stat_key}</span><span class="pill">${item.value_type}</span></div><div class="meta">${item.min_value} - ${item.max_value}${item.unit||""} / 重み ${item.weight} / ${item.enabled?"有効":"無効"}</div></div>`).join(""):`<div class="meta">まだありません。</div>`}if(adminToken())enterAdmin();</script></body></html>
