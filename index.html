<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おあしすヒーローズ</title>
  <style>
    :root {
      --bg: #f6f8ee;
      --ink: #18251e;
      --muted: #637065;
      --line: #dce4d5;
      --panel: #ffffff;
      --accent: #2d8c57;
      --accent-2: #e3a32d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 { font-size: 24px; margin: 0 0 6px; }
    h2 { margin: 0 0 10px; font-size: 17px; }
    .sub, .meta, .log { color: var(--muted); }
    .sub, .meta { font-size: 13px; }
    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
    }
    main.creation { display: block; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .grid { display: grid; gap: 8px; }
    .hero {
      min-height: 220px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      align-items: center;
    }
    .art-wrap {
      height: 154px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid #c9d9c8;
      border-radius: 8px;
      background: linear-gradient(#f4fbf0, #dfeedd);
    }
    .class-art {
      width: 160px;
      height: 160px;
      display: block;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcf7;
    }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-weight: 700; font-size: 20px; margin-top: 3px; }
    .item, .listing {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background: #fff;
    }
    .item strong, .listing strong { display: block; }
    .item-icon {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7faf4;
      padding: 4px;
      margin-right: 8px;
      vertical-align: middle;
    }
    .legendary { border-color: #e3a32d; background: #fff9e8; }
    .epic { border-color: #8e6ad8; background: #f7f2ff; }
    .rare { border-color: #3d8fd9; background: #eff7ff; }
    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #edf3e9; color: var(--ink); border: 1px solid var(--line); }
    input {
      width: 86px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
    }
    .actions { display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .log { min-height: 44px; font-size: 13px; line-height: 1.5; }
    .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .tab.active { background: var(--accent-2); color: #20150a; }
    .class-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .class-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 10px;
    }
    .class-card .art-wrap { height: 116px; }
    .class-card .class-art { width: 132px; height: 132px; }
    .class-card h3 { margin: 0; font-size: 16px; }
    @media (max-width: 860px) {
      main { grid-template-columns: 1fr; padding: 10px; }
      .class-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .hero { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .class-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>おあしすヒーローズ</h1>
        <div class="sub">放置で冒険、装備を集めて、交易所で売り買いできます。</div>
      </div>
      <button class="secondary" type="button" onclick="openAdminMenu()">管理メニュー</button>
    </div>
  </header>
  <main id="app">
    <section>
      <h2>読み込み中...</h2>
      <div class="log" id="log"></div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const session = params.get("session");
    const API_BASE = (params.get("api") || location.origin).replace(/\/$/, "");
    const state = { data: null };

    function openAdminMenu() {
      const token = prompt("HEROES_ADMIN_TOKENを入力してください。");
      if (!token) return;
      localStorage.setItem("heroes_admin_token", token);
      localStorage.setItem("heroes_admin_api", API_BASE);
      location.href = `admin.html?api=${encodeURIComponent(API_BASE)}`;
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "通信に失敗しました");
      return data;
    }

    function art(key, name) {
      const safeKey = key || "swordsman";
      const safeName = name || "ヒーロー";
      return `<div class="art-wrap"><img class="class-art" src="assets/classes/${safeKey}.svg" alt="${safeName}"></div>`;
    }

    function itemClass(item) {
      return `item ${item.rarity || ""}`;
    }

    function itemLine(item) {
      const slot = state.data?.slot_labels?.[item.slot] || item.slot;
      return `<strong>${item.rarity_label} ${item.name}</strong><div class="meta">${slot} / 強さ +${item.power}${item.equipped ? " / 装備中" : ""}</div>`;
    }

    async function load() {
      try {
        state.data = await api(`/api/heroes/me?session=${encodeURIComponent(session)}`);
        render();
      } catch (error) {
        document.getElementById("app").className = "creation";
        document.getElementById("app").innerHTML = `<section><h2>接続できませんでした</h2><div class="log">${error.message}</div></section>`;
      }
    }

    function render() {
      const data = state.data;
      if (data.needs_creation) {
        renderCreation(data);
        return;
      }
      renderDashboard(data);
    }

    function renderCreation(data) {
      document.getElementById("app").className = "creation";
      document.getElementById("app").innerHTML = `
        <section>
          <h2>キャラクター作成</h2>
          <div class="log">最初の職業を選んでください。あとから装備を集めてどんどん強くなります。</div>
          <div class="class-grid">
            ${data.classes.map(job => `
              <div class="class-card">
                ${art(job.key, job.name)}
                <div>
                  <h3>${job.name}</h3>
                  <div class="meta">${job.summary}</div>
                </div>
                <button type="button" onclick="createCharacter('${job.key}')">この職業で始める</button>
              </div>
            `).join("")}
          </div>
        </section>`;
    }

    async function createCharacter(classKey) {
      state.data = await api("/api/heroes/create-character", {
        method: "POST",
        body: JSON.stringify({ session, class_key: classKey })
      });
      render();
    }

    function renderDashboard(data) {
      const classInfo = (data.classes || []).find(job => job.key === data.character.class_key) || { key: "swordsman", name: "ヒーロー" };
      document.getElementById("app").className = "";
      document.getElementById("app").innerHTML = `
        <div class="grid">
          <section class="hero">
            ${art(classInfo.key, classInfo.name)}
            <div>
              <h2>${data.character.user_name || "おあしすヒーロー"}</h2>
              <div class="log">${logText(data)}</div>
              <div class="stats">
                <div class="stat"><div class="label">職業</div><div class="value">${classInfo.name}</div></div>
                <div class="stat"><div class="label">レベル</div><div class="value">${data.character.level}</div></div>
                <div class="stat"><div class="label">総合力</div><div class="value">${data.power}</div></div>
                <div class="stat"><div class="label">ゴールド</div><div class="value">${data.character.gold}</div></div>
              </div>
            </div>
          </section>
          <section>
            <h2>装備中</h2>
            <div class="grid">${equippedHtml(data)}</div>
          </section>
          <section>
            <h2>インベントリー ${data.inventory_count ?? data.inventory.length}/${data.inventory_limit ?? 40}</h2>
            <div class="grid">${inventoryHtml(data)}</div>
          </section>
        </div>
        <section>
          <div class="tabs">
            <button class="tab active" type="button">交易所</button>
            <button class="secondary" type="button" onclick="load()">更新</button>
          </div>
          <div class="grid">${listingsHtml(data)}</div>
        </section>`;
    }

    function logText(data) {
      const drops = data.drops || [];
      return drops.length
        ? `${drops.length}個の装備を拾いました。`
        : "冒険中です。しばらく放置すると経験値・ゴールド・装備が入ります。";
    }

    function equippedHtml(data) {
      return data.equipped.length
        ? data.equipped.map(item => `<div class="${itemClass(item)}"><div>${itemLine(item)}</div></div>`).join("")
        : `<div class="meta">まだ装備していません。</div>`;
    }

    function inventoryHtml(data) {
      if (!data.inventory.length) return `<div class="meta">装備はまだありません。</div>`;
      return data.inventory.map(item => {
        const priceId = `price-${item.id}`;
        const buttons = item.equipped
          ? ""
          : `<div class="actions"><button onclick="equip(${item.id})">装備</button><input id="${priceId}" type="number" min="1" value="${Math.max(50, item.power * 10)}"><button class="secondary" onclick="listItem(${item.id}, '${priceId}')">出品</button></div>`;
        return `<div class="${itemClass(item)}"><div>${itemLine(item)}</div>${buttons}</div>`;
      }).join("");
    }

    function listingsHtml(data) {
      if (!data.listings.length) return `<div class="meta">出品はまだありません。</div>`;
      return data.listings.map(item => `
        <div class="listing ${item.rarity}">
          <div>
            <strong>${item.rarity_label} ${item.name}</strong>
            <div class="meta">強さ +${item.power} / 出品者 ${item.seller_name || "不明"}</div>
          </div>
          <div class="actions"><strong>${item.price}G</strong><button onclick="buy(${item.listing_id})">購入</button></div>
        </div>`).join("");
    }

    async function equip(itemId) {
      state.data = await api("/api/heroes/equip", {
        method: "POST",
        body: JSON.stringify({ session, item_id: itemId })
      });
      render();
    }

    async function listItem(itemId, inputId) {
      const price = Number(document.getElementById(inputId).value || 0);
      state.data = await api("/api/heroes/trade/list", {
        method: "POST",
        body: JSON.stringify({ session, item_id: itemId, price })
      });
      render();
    }

    async function buy(listingId) {
      state.data = await api("/api/heroes/trade/buy", {
        method: "POST",
        body: JSON.stringify({ session, listing_id: listingId })
      });
      render();
    }

    if (!session) {
      document.getElementById("app").className = "creation";
      document.getElementById("app").innerHTML = `<section><h2>Discordから開いてください</h2><div class="log">Botのリンクからアクセスするとプレイできます。</div></section>`;
    } else {
      load();
      setInterval(() => {
        if (!state.data?.needs_creation) load();
      }, 60000);
    }
  </script>
</body>
</html>
