<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おあしすヒーローズ</title>
  <style>
    :root {
      --bg: #f6f8ee;
      --ink: #18251e;
      --muted: #637065;
      --line: #dce4d5;
      --panel: #ffffff;
      --accent: #2d8c57;
      --accent-2: #e3a32d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 6px;
    }
    .sub { color: var(--muted); font-size: 13px; }
    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    h2 { margin: 0 0 10px; font-size: 17px; }
    .hero {
      min-height: 220px;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 16px;
      align-items: center;
    }
    .avatar {
      width: 148px;
      height: 148px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 28%, #ffe6a3 0 18%, transparent 19%),
        linear-gradient(145deg, #2d8c57, #8fd3a8);
      border: 1px solid #c9d9c8;
      position: relative;
    }
    .avatar:after {
      content: "";
      position: absolute;
      left: 42px;
      top: 62px;
      width: 64px;
      height: 62px;
      border-radius: 8px 8px 18px 18px;
      background: #f1f7e7;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,.08);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcf7;
    }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-weight: 700; font-size: 20px; margin-top: 3px; }
    .grid { display: grid; gap: 8px; }
    .item, .listing {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background: #fff;
    }
    .item strong, .listing strong { display: block; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .legendary { border-color: #e3a32d; background: #fff9e8; }
    .epic { border-color: #8e6ad8; background: #f7f2ff; }
    .rare { border-color: #3d8fd9; background: #eff7ff; }
    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #edf3e9; color: var(--ink); border: 1px solid var(--line); }
    input {
      width: 86px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
    }
    .actions { display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .log {
      min-height: 44px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .tab.active { background: var(--accent-2); color: #20150a; }
    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; padding: 10px; }
      .hero { grid-template-columns: 1fr; }
      .avatar { margin: 0 auto; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>おあしすヒーローズ</h1>
    <div class="sub">放置で冒険、装備を集めて、交易所で売り買いできます。</div>
  </header>
  <main>
    <div class="grid">
      <section class="hero">
        <div class="avatar" aria-label="ヒーロー"></div>
        <div>
          <h2 id="name">読み込み中...</h2>
          <div class="log" id="log"></div>
          <div class="stats">
            <div class="stat"><div class="label">レベル</div><div class="value" id="level">-</div></div>
            <div class="stat"><div class="label">総合力</div><div class="value" id="power">-</div></div>
            <div class="stat"><div class="label">ゴールド</div><div class="value" id="gold">-</div></div>
          </div>
        </div>
      </section>
      <section>
        <h2>装備中</h2>
        <div class="grid" id="equipped"></div>
      </section>
      <section>
        <h2>インベントリー</h2>
        <div class="grid" id="inventory"></div>
      </section>
    </div>
    <section>
      <div class="tabs">
        <button class="tab active" type="button">交易所</button>
        <button class="secondary" type="button" onclick="load()">更新</button>
      </div>
      <div class="grid" id="listings"></div>
    </section>
  </main>
  <script>
    const session = new URLSearchParams(location.search).get("session");
    const state = { data: null };

    function itemClass(item) {
      return `item ${item.rarity || ""}`;
    }

    function itemLine(item) {
      const slot = state.data?.slot_labels?.[item.slot] || item.slot;
      return `<strong>${item.rarity_label} ${item.name}</strong><div class="meta">${slot} / 強さ +${item.power}${item.equipped ? " / 装備中" : ""}</div>`;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "通信に失敗しました");
      return data;
    }

    async function load() {
      try {
        state.data = await api(`/api/heroes/me?session=${encodeURIComponent(session)}`);
        render();
      } catch (error) {
        document.getElementById("log").textContent = error.message;
      }
    }

    function render() {
      const data = state.data;
      document.getElementById("name").textContent = data.character.user_name || "おあしすヒーロー";
      document.getElementById("level").textContent = data.character.level;
      document.getElementById("power").textContent = data.power;
      document.getElementById("gold").textContent = data.character.gold;

      const drops = data.drops || [];
      document.getElementById("log").textContent = drops.length
        ? `${drops.length}個の装備を拾いました。`
        : "冒険中です。しばらく放置すると経験値・ゴールド・装備が入ります。";

      document.getElementById("equipped").innerHTML = data.equipped.length
        ? data.equipped.map(item => `<div class="${itemClass(item)}"><div>${itemLine(item)}</div></div>`).join("")
        : `<div class="meta">まだ装備していません。</div>`;

      document.getElementById("inventory").innerHTML = data.inventory.length
        ? data.inventory.map(item => {
            const priceId = `price-${item.id}`;
            const buttons = item.equipped
              ? ""
              : `<div class="actions"><button onclick="equip(${item.id})">装備</button><input id="${priceId}" type="number" min="1" value="${Math.max(50, item.power * 10)}"><button class="secondary" onclick="listItem(${item.id}, '${priceId}')">出品</button></div>`;
            return `<div class="${itemClass(item)}"><div>${itemLine(item)}</div>${buttons}</div>`;
          }).join("")
        : `<div class="meta">装備はまだありません。</div>`;

      document.getElementById("listings").innerHTML = data.listings.length
        ? data.listings.map(item => `<div class="listing ${item.rarity}"><div><strong>${item.rarity_label} ${item.name}</strong><div class="meta">強さ +${item.power} / 出品者 ${item.seller_name || "不明"}</div></div><div class="actions"><strong>${item.price}G</strong><button onclick="buy(${item.listing_id})">購入</button></div></div>`).join("")
        : `<div class="meta">出品はまだありません。</div>`;
    }

    async function equip(itemId) {
      state.data = await api("/api/heroes/equip", {
        method: "POST",
        body: JSON.stringify({ session, item_id: itemId })
      });
      render();
    }

    async function listItem(itemId, inputId) {
      const price = Number(document.getElementById(inputId).value || 0);
      state.data = await api("/api/heroes/trade/list", {
        method: "POST",
        body: JSON.stringify({ session, item_id: itemId, price })
      });
      render();
    }

    async function buy(listingId) {
      state.data = await api("/api/heroes/trade/buy", {
        method: "POST",
        body: JSON.stringify({ session, listing_id: listingId })
      });
      render();
    }

    if (!session) {
      document.getElementById("log").textContent = "Discordからリンクを発行してください。";
    } else {
      load();
      setInterval(load, 60000);
    }
  </script>
</body>
</html>
