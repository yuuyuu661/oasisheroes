<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おあしすヒーローズ</title>
  <style>
    :root {
      --bg: #f6f8ee;
      --ink: #18251e;
      --muted: #637065;
      --line: #dce4d5;
      --panel: #ffffff;
      --accent: #2d8c57;
      --accent-2: #e3a32d;
      --danger: #b64a3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .header-row, .actions, .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-row { justify-content: space-between; }
    h1 { font-size: 24px; margin: 0 0 4px; }
    h2 { margin: 0 0 10px; font-size: 17px; }
    h3 { margin: 0; font-size: 15px; }
    .sub, .meta, .log { color: var(--muted); }
    .sub, .meta { font-size: 13px; }
    .log { min-height: 34px; font-size: 13px; line-height: 1.5; }
    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 14px;
    }
    main.creation { display: block; }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .grid { display: grid; gap: 10px; }
    .hero {
      min-height: 210px;
      display: grid;
      grid-template-columns: 174px 1fr;
      gap: 16px;
      align-items: center;
    }
    .art-wrap {
      height: 154px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid #c9d9c8;
      border-radius: 8px;
      background: linear-gradient(#f4fbf0, #dfeedd);
    }
    .class-art {
      width: 160px;
      height: 160px;
      display: block;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fbfcf7;
    }
    .label { color: var(--muted); font-size: 12px; }
    .value { font-weight: 800; font-size: 20px; margin-top: 3px; }
    .tab {
      background: #edf3e9;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .tab.active { background: var(--accent-2); color: #20150a; border-color: var(--accent-2); }
    .item, .listing, .stage-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
      background: #fff;
    }
    .item, .listing {
      grid-template-columns: 1fr auto;
      align-items: center;
    }
    .item strong, .listing strong { display: block; }
    .item-title { display: flex; gap: 8px; align-items: center; min-width: 0; }
    .item-icon {
      width: 42px;
      height: 42px;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7faf4;
      padding: 4px;
      flex: 0 0 auto;
    }
    .normal { border-color: #dce4d5; }
    .magic { border-color: #5b8fd8; background: #f1f7ff; }
    .rare { border-color: #d6a032; background: #fff9e8; }
    .unique { border-color: #8e6ad8; background: #f7f2ff; }
    .mythic { border-color: #d85b5b; background: #fff0f0; }
    .equipment-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    .slot-card {
      min-height: 130px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      display: grid;
      align-content: start;
      gap: 6px;
      background: #f9fbf6;
    }
    .slot-frame {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 1px solid #cad5c5;
      background: #111 url("assets/ui/empty-equipment-frame.png") center / cover no-repeat;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .slot-frame img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.25));
    }
    .slot-name { font-weight: 800; font-size: 12px; }
    .stat-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .stage-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .stage-card.current { border-color: var(--accent); background: #f1fbf4; }
    .stage-card.locked { opacity: .56; }
    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      padding: 8px 10px;
      font-weight: 800;
      cursor: pointer;
    }
    button.secondary { background: #edf3e9; color: var(--ink); border: 1px solid var(--line); }
    button.danger { background: var(--danger); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    input {
      width: 86px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
    }
    .class-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .class-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 10px;
    }
    .class-card .art-wrap { height: 116px; }
    .class-card .class-art { width: 132px; height: 132px; }
    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; padding: 10px; }
      .class-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      .hero { grid-template-columns: 1fr; }
      .stats, .stat-list, .stage-grid { grid-template-columns: 1fr 1fr; }
      .equipment-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .class-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-row">
      <div>
        <h1>おあしすヒーローズ</h1>
        <div class="sub">ステージを選び、放置で装備とゴールドを集めて強くなります。</div>
      </div>
      <button class="secondary" type="button" onclick="openAdminMenu()">管理者ページ</button>
    </div>
  </header>
  <main id="app">
    <section>
      <h2>読み込み中...</h2>
      <div class="log" id="log"></div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const session = params.get("session");
    const API_BASE = (params.get("api") || location.origin).replace(/\/$/, "");
    const state = { data: null, tab: "stats" };

    const STAT_LABELS = {
      health: "体力",
      mana: "マナ",
      energy_shield: "エナジーシールド",
      physical_damage: "物理ダメージ",
      magic_damage: "魔法ダメージ",
      fire_damage: "火ダメージ",
      cold_damage: "冷気ダメージ",
      lightning_damage: "雷ダメージ",
      crit_rate: "クリティカル率",
      crit_damage: "クリティカルダメージ倍率",
      fire_resist: "火耐性",
      cold_resist: "冷気耐性",
      lightning_resist: "雷耐性",
      chaos_resist: "混沌耐性",
      physical_resist: "物理耐性",
      health_regen: "体力自然回復",
      mana_regen: "マナ自然回復"
    };
    const PERCENT_STATS = new Set(["crit_rate", "crit_damage", "fire_resist", "cold_resist", "lightning_resist", "chaos_resist", "physical_resist"]);
    const SLOT_ORDER = [
      ["main_hand", "メイン武器"],
      ["off_hand", "オフハンド"],
      ["head", "兜"],
      ["body", "胴体"],
      ["hands", "手袋"],
      ["feet", "靴"],
      ["belt", "ベルト"],
      ["ring", "指輪"],
      ["ring", "指輪"],
      ["amulet", "アミュレット"]
    ];

    function openAdminMenu() {
      const token = prompt("HEROES_ADMIN_TOKENを入力してください。");
      if (!token) return;
      localStorage.setItem("heroes_admin_token", token);
      localStorage.setItem("heroes_admin_api", API_BASE);
      location.href = `admin.html?api=${encodeURIComponent(API_BASE)}`;
    }

    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "通信に失敗しました");
      return data;
    }

    function art(key, name) {
      const safeKey = key || "swordsman";
      const safeName = name || "ヒーロー";
      return `<div class="art-wrap"><img class="class-art" src="assets/classes/${safeKey}.svg" alt="${safeName}"></div>`;
    }

    function itemImageUrl(url) {
      if (!url) return "";
      if (url.startsWith("/api/")) return `${API_BASE}${url}`;
      return url;
    }

    function itemClass(item) {
      return `item ${item.rarity || "normal"}`;
    }

    function itemLine(item) {
      const slot = state.data?.slot_labels?.[item.slot] || item.slot;
      const image = item.image_url ? `<img class="item-icon" src="${itemImageUrl(item.image_url)}" alt="${item.name}">` : "";
      return `<div class="item-title">${image}<div><strong>${item.rarity_label || ""} ${item.name}</strong><div class="meta">${slot} / 強さ +${item.power}${item.equipped ? " / 装備中" : ""}</div></div></div>`;
    }

    async function load() {
      try {
        state.data = await api(`/api/heroes/me?session=${encodeURIComponent(session)}`);
        render();
      } catch (error) {
        document.getElementById("app").className = "creation";
        document.getElementById("app").innerHTML = `<section><h2>接続できませんでした</h2><div class="log">${error.message}</div></section>`;
      }
    }

    function render() {
      const data = state.data;
      if (data.needs_creation) {
        renderCreation(data);
        return;
      }
      renderDashboard(data);
    }

    function renderCreation(data) {
      document.getElementById("app").className = "creation";
      document.getElementById("app").innerHTML = `
        <section>
          <h2>キャラクター作成</h2>
          <div class="log">最初の職業を選んでください。あとから装備を集めて、どんどん強くなります。</div>
          <div class="class-grid">
            ${data.classes.map(job => `
              <div class="class-card">
                ${art(job.key, job.name)}
                <div>
                  <h3>${job.name}</h3>
                  <div class="meta">${job.summary}</div>
                </div>
                <button type="button" onclick="createCharacter('${job.key}')">この職業で始める</button>
              </div>
            `).join("")}
          </div>
        </section>`;
    }

    async function createCharacter(classKey) {
      state.data = await api("/api/heroes/create-character", {
        method: "POST",
        body: JSON.stringify({ session, class_key: classKey })
      });
      render();
    }

    function renderDashboard(data) {
      const classInfo = (data.classes || []).find(job => job.key === data.character.class_key) || { key: "swordsman", name: "ヒーロー" };
      document.getElementById("app").className = "";
      document.getElementById("app").innerHTML = `
        <div class="grid">
          <section class="hero">
            ${art(classInfo.key, classInfo.name)}
            <div>
              <h2>${data.character.user_name || "おあしすヒーロー"}</h2>
              <div class="log">${logText(data)}</div>
              <div class="stats">
                <div class="stat"><div class="label">職業</div><div class="value">${classInfo.name}</div></div>
                <div class="stat"><div class="label">レベル</div><div class="value">${data.character.level}</div></div>
                <div class="stat"><div class="label">総合力</div><div class="value">${data.power}</div></div>
                <div class="stat"><div class="label">ゴールド</div><div class="value">${data.character.gold}</div></div>
              </div>
            </div>
          </section>
          <section>
            <div class="tabs">
              <button class="tab ${state.tab === "stats" ? "active" : ""}" type="button" onclick="setTab('stats')">ステータス</button>
              <button class="tab ${state.tab === "equipment" ? "active" : ""}" type="button" onclick="setTab('equipment')">装備</button>
              <button class="secondary" type="button" onclick="load()">更新</button>
            </div>
            ${state.tab === "stats" ? statsHtml(data) : equipmentHtml(data)}
          </section>
          <section>
            <h2>インベントリー ${data.inventory_count ?? data.inventory.length}/${data.inventory_limit ?? 40}</h2>
            <div class="grid">${inventoryHtml(data)}</div>
          </section>
        </div>
        <div class="grid">
          <section>
            <h2>放置ステージ</h2>
            <div class="stage-grid">${stagesHtml(data)}</div>
          </section>
          <section>
            <h2>交易所</h2>
            <div class="grid">${listingsHtml(data)}</div>
          </section>
        </div>`;
    }

    function setTab(tab) {
      state.tab = tab;
      render();
    }

    function logText(data) {
      if (data.boss_result) {
        const result = data.boss_result;
        return result.victory
          ? `${result.boss_name}を倒しました。ステージ${result.stage}が開放されました。`
          : `${result.boss_name}に敗北しました。戦力 ${result.hero_roll} / ボス ${result.boss_roll}`;
      }
      const drops = data.drops || [];
      return drops.length
        ? `${drops.length}個の装備を獲得しました。`
        : "放置中です。ステージに応じて経験値、ゴールド、装備が入ります。";
    }

    function formatStat(key, value) {
      const suffix = PERCENT_STATS.has(key) ? "%" : "";
      return `${value}${suffix}`;
    }

    function statsHtml(data) {
      const stats = data.stats || {};
      return `<div class="stat-list">${Object.entries(STAT_LABELS).map(([key, label]) => `
        <div class="stat"><div class="label">${label}</div><div class="value">${formatStat(key, stats[key] ?? 0)}</div></div>
      `).join("")}</div>`;
    }

    function equipmentHtml(data) {
      const bySlot = {};
      for (const item of data.equipped || []) {
        if (!bySlot[item.slot]) bySlot[item.slot] = [];
        bySlot[item.slot].push(item);
      }
      const ringItems = bySlot.ring || [];
      let ringIndex = 0;
      return `<div class="equipment-grid">${SLOT_ORDER.map(([slot, label]) => {
        const item = slot === "ring" ? ringItems[ringIndex++] : (bySlot[slot] || [])[0];
        return `<div class="slot-card">
          <div class="slot-name">${label}</div>
          <div class="slot-frame">${item?.image_url ? `<img src="${itemImageUrl(item.image_url)}" alt="${item.name}">` : ""}</div>
          <div class="meta">${item ? `${item.rarity_label || ""} ${item.name}` : "空き"}</div>
        </div>`;
      }).join("")}</div>`;
    }

    function inventoryHtml(data) {
      if (!data.inventory.length) return `<div class="meta">装備はまだありません。</div>`;
      return data.inventory.map(item => {
        const priceId = `price-${item.id}`;
        const buttons = item.equipped
          ? ""
          : `<div class="actions"><button onclick="equip(${item.id})">装備</button><input id="${priceId}" type="number" min="1" value="${Math.max(50, item.power * 10)}"><button class="secondary" onclick="listItem(${item.id}, '${priceId}')">出品</button></div>`;
        return `<div class="${itemClass(item)}"><div>${itemLine(item)}</div>${buttons}</div>`;
      }).join("");
    }

    function stagesHtml(data) {
      return (data.stages || []).map(stage => {
        const locked = !stage.unlocked;
        const bossAvailable = stage.boss_unlocked;
        return `<div class="stage-card ${stage.current ? "current" : ""} ${locked && !bossAvailable ? "locked" : ""}">
          <h3>${stage.name}</h3>
          <div class="meta">モンスターレベル ${stage.monster_level}</div>
          <div class="meta">経験値 ${stage.exp_per_hour}/H / ゴールド ${stage.gold_per_hour}/H</div>
          <div class="actions">
            <button type="button" onclick="selectStage(${stage.stage})" ${locked ? "disabled" : ""}>放置する</button>
            ${bossAvailable ? `<button class="secondary" type="button" onclick="challengeBoss(${stage.stage})">ボス挑戦</button>` : ""}
          </div>
          ${bossAvailable ? `<div class="meta">${stage.boss_name} / 必要目安 ${stage.boss_power}</div>` : ""}
        </div>`;
      }).join("");
    }

    function listingsHtml(data) {
      if (!data.listings.length) return `<div class="meta">出品はまだありません。</div>`;
      const full = (data.inventory_count ?? data.inventory.length) >= (data.inventory_limit ?? 40);
      return data.listings.map(item => `
        <div class="listing ${item.rarity}">
          <div>
            ${itemLine(item)}
            <div class="meta">出品者 ${item.seller_name || "不明"}</div>
          </div>
          <div class="actions"><strong>${item.price}G</strong><button onclick="buy(${item.listing_id})" ${full ? "disabled" : ""}>購入</button></div>
        </div>`).join("") + (full ? `<div class="meta">インベントリーが満タンのため購入できません。</div>` : "");
    }

    async function equip(itemId) {
      state.data = await api("/api/heroes/equip", {
        method: "POST",
        body: JSON.stringify({ session, item_id: itemId })
      });
      render();
    }

    async function listItem(itemId, inputId) {
      const price = Number(document.getElementById(inputId).value || 0);
      state.data = await api("/api/heroes/trade/list", {
        method: "POST",
        body: JSON.stringify({ session, item_id: itemId, price })
      });
      render();
    }

    async function buy(listingId) {
      state.data = await api("/api/heroes/trade/buy", {
        method: "POST",
        body: JSON.stringify({ session, listing_id: listingId })
      });
      render();
    }

    async function selectStage(stage) {
      state.data = await api("/api/heroes/stage/select", {
        method: "POST",
        body: JSON.stringify({ session, stage })
      });
      render();
    }

    async function challengeBoss(stage) {
      state.data = await api("/api/heroes/boss/challenge", {
        method: "POST",
        body: JSON.stringify({ session, stage })
      });
      render();
    }

    if (!session) {
      document.getElementById("app").className = "creation";
      document.getElementById("app").innerHTML = `<section><h2>Discordから開いてください</h2><div class="log">Botのリンクからアクセスするとプレイできます。</div></section>`;
    } else {
      load();
      setInterval(() => {
        if (!state.data?.needs_creation) load();
      }, 60000);
    }
  </script>
</body>
</html>
